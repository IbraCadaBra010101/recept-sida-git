<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smakriket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Smakriket</h1>

            <ul class="nav-links">
                <li><a href="#">Recept</a></li>
                <li><a href="#">Kategorier</a></li>
                <li><a href="#">Om oss</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h2>Välkomen till Smakriket</h2>
            <p>
                Upptäck goda recept från hela världen
                filterera recept efter kategori och hitta nya favoriter.
            </p>
        </section>

        <section class="recipe-layout">

            <div class="main-card">
                Stor receptbild
            </div>

            <div class="small-card">
                Receptkort
            </div>

            <div class="small-card">
                Receptkort
            </div>

            <div class="wide-card">

            </div>

            <div class="recipe-info">
                <h3>Receptdetaljer</h3>

                <p>Ingredienser</p>

                <button class="read-btn"> Läs mer</button>
                <button class="save-btn"> Spara</button>
            </div>
        </section>

        <section class="categories">

            <button class="green-btn">Förrätter</button>

            <button class=" red-btn">Huvudrätter</button>

            <button class="orange-btn">Efterrätter</button>

            <button class="green-btn">Vegetariskt</button>
        </section>
    </main>

    <footer>
        <p>© 2025 Smakriket - Alla rättigheter förbehåller</p>
    </footer>
    
</body>
</html>
