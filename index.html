<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smakriket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Smakriket</h1>

            <ul class="nav-links">
                <li><a href="#">Recept</a></li>
                <li><a href="#">Kategorier</a></li>
                <li><a href="#">Om oss</a></li>
                <li><a href="#">Om oss</a></li>

            </ul>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h2>Välkommen till Smakriket</h2>
            <p>
                Upptäck goda recept från hela världen. Filtrera efter kategori
                och hitta nya favoriter bland våra receptkort.
            </p>
        </section>

        <section class="recipes">
            <h2 class="recipes-title">Recept</h2>

            <div class="filter-bar">
                <button class="filter-btn active" data-category="alla">Visa alla</button>
                <button class="filter-btn green-btn" data-category="forratter">Förrätter</button>
                <button class="filter-btn red-btn" data-category="huvudratter">Huvudrätter</button>
                <button class="filter-btn orange-btn" data-category="efterratter">Efterrätter</button>
                <button class="filter-btn green-btn" data-category="vegetariskt">Vegetariskt</button>
            </div>

            <div id="recipe-grid" class="recipe-grid"></div>
        </section>
    </main>

    <footer>
        <p>© 2025 Smakriket - Alla rättigheter förbehåller</p>
    </footer>

    <script src="js/recipes.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
